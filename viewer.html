<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 1.1rem;
            margin-top: 40px;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #ddd;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-msg {
            display: none;
            background: #fff0f0;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            padding: 16px 24px;
            border-radius: 8px;
            margin-top: 30px;
            max-width: 480px;
            text-align: center;
        }

        .canvas-container {
            box-shadow: 0 10px 40px rgba(0,0,0,0.28);
            background-color: #fff;
            display: none;
            margin-top: 20px;
        }

        .page {
            background-color: white;
            overflow: hidden;
        }

        .page canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #nav-controls {
            display: none;
            margin-top: 18px;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        #nav-controls button {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #nav-controls button:hover {
            background: #2f74c0;
        }

        #page-info {
            font-size: 0.9rem;
            color: #555;
            min-width: 100px;
            text-align: center;
            background: white;
            padding: 8px 16px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header a {
            color: #4a90d9;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .header h2 {
            margin: 0;
            flex-grow: 1;
            text-align: center;
            color: #333;
            font-size: 1.3rem;
            padding: 0 16px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 12px;
            }

            .header h2 {
                padding: 0;
                font-size: 1.1rem;
            }

            #nav-controls {
                flex-direction: column;
                width: 100%;
            }

            #nav-controls button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">← Torna al catalogo</a>
        <h2 id="flipbook-title">Flipbook</h2>
        <div></div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <span>Caricamento flipbook in corso...</span>
    </div>

    <div id="error-msg"></div>

    <div id="flipbook" class="canvas-container"></div>

    <div id="nav-controls">
        <button id="btn-prev">&#8249; Precedente</button>
        <span id="page-info"></span>
        <button id="btn-next">Successiva &#8250;</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <script src="js/viewer.js"></script>
</body>
</html>
